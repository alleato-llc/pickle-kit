name: Report → GitHub Pages

# On every push to main: generate the living spec + report from PickleKit's own
# dogfooded scenarios (swift test + PICKLE_REPORT), screenshot both, and publish
# them to GitHub Pages as a live demo. The screenshots the README links to are
# produced here — never committed — so they always match the current report.

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the report changes — not on
    # README/docs edits (they don't alter the generated pages or screenshots).
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - ".github/workflows/pages.yml"
      - ".github/scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate spec + report
        run: |
          mkdir -p _site
          # Generate from PickleKit's OWN cucumber scenarios — the feature
          # fixtures, run by GherkinIntegrationTests in one deterministic
          # parameterized pass (not a side effect of the whole 253-test run, so
          # the report is exactly our cucumber tests). They pass, so this gates
          # honestly: no `|| true`, and a real failure here fails the workflow.
          PICKLE_REPORT=1 \
            PICKLE_REPORT_PATH="$PWD/_site/report.html" \
            PICKLE_SPEC_PATH="$PWD/_site/index.html" \
            PICKLE_SPEC_TITLE="PickleKit — Living Specification" \
            swift test --filter GherkinIntegrationTests
          test -s _site/report.html && test -s _site/index.html

      - name: Pin theme variants
        run: |
          # The showcase links want DISTINCT pages, not one report.html that
          # relies on a ?theme= query surviving the click. So emit a standalone
          # copy per palette where the theme is hard-pinned: replace the
          # pre-paint's `forced` lookup with a literal, so it ignores the query,
          # localStorage, and the OS preference. The grep guards the rewrite —
          # if the pre-paint line ever changes, this step fails loudly rather
          # than silently shipping unpinned copies.
          for t in dark nord gruvbox; do
            sed "s|var forced = new URLSearchParams(location.search).get('theme');|var forced = '$t';|" \
              _site/report.html > "_site/report-$t.html"
            grep -q "var forced = '$t';" "_site/report-$t.html"
          done

      - name: Screenshot
        run: |
          python3 -m pip install --quiet --break-system-packages pillow \
            || python3 -m pip install --quiet pillow
          CHROME="/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
          mkdir -p /tmp/shots _site/screenshots
          # The living spec, plus the report in each built-in palette — one
          # standalone theme-pinned page apiece, so the README's showcase links
          # land on genuinely different reports.
          shoot() {
            "$CHROME" --headless=new --disable-gpu --hide-scrollbars \
              --force-device-scale-factor=2 --window-size=1100,3200 \
              --screenshot="/tmp/shots/$1.png" "file://$PWD/_site/$1.html"
          }
          shoot index
          shoot report
          shoot report-dark
          shoot report-nord
          shoot report-gruvbox
          python3 .github/scripts/trim.py /tmp/shots _site/screenshots

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
